kind = "web"
previewPath = "/"
title = "HRS Fashion"
version = "1.0.0"
id = "artifacts/hrs-fashion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25760

[services.development]
run = "pnpm --filter @workspace/hrs-fashion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hrs-fashion", "run", "build" ]
publicDir = "artifacts/hrs-fashion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25760"
BASE_PATH = "/"
